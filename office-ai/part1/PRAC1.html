<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>演練 · Prompt 黃金公式填空台｜辦公室 AI 工具實務應用</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>:root{--c-bg:#f5f3ee;--c-surface:#edeae3;--c-card:#ffffff;--c-border:#d8d4cb;--c-text:#2c2b28;--c-muted:#8c8880;--c-a1:#b5703a;--c-a2:#c9963a;--c-a3:#5a7a5a;--c-a4:#6b7fa3;--c-a5:#7a9ea3;--radius:6px;--radius-sm:4px;--content-w:780px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.8;}
.topbar{position:sticky;top:0;z-index:50;height:56px;background:rgba(245,243,238,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--c-border);display:flex;align-items:center;padding:0 48px;gap:16px;}
.logo{font-family:'Shippori Mincho',serif;font-weight:700;font-size:1.05rem;color:var(--c-text);letter-spacing:.05em;text-decoration:none;}
.topbar-divider{width:1px;height:18px;background:var(--c-border);}
.topbar-sub{font-size:.8rem;color:var(--c-muted);}
.spacer{flex:1;}
.topbar-tag{font-size:.75rem;color:var(--c-a2);border:1px solid rgba(201,150,58,.3);background:rgba(201,150,58,.07);padding:3px 12px;border-radius:99px;font-weight:500;}
.prac-hero{max-width:var(--content-w);margin:0 auto;padding:64px 48px 48px;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:var(--c-muted);text-decoration:none;margin-bottom:28px;}
.back-link:hover{color:var(--c-a2);}
.hero-eyebrow{font-size:.7rem;color:var(--c-a2);letter-spacing:2px;font-weight:500;margin-bottom:14px;}
.prac-title{font-family:'Shippori Mincho',serif;font-size:2rem;font-weight:700;line-height:1.3;color:var(--c-text);margin-bottom:16px;}
.prac-tagline{font-size:.95rem;color:var(--c-muted);line-height:1.9;max-width:560px;}
.tool-wrap{max-width:720px;margin:0 auto;padding:0 48px 80px;}
.tool-section{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);padding:28px;margin-bottom:20px;}
.tool-label{font-size:.7rem;color:var(--c-a2);font-weight:500;letter-spacing:1px;margin-bottom:12px;}
.tool-title{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:700;color:var(--c-text);margin-bottom:16px;}
.field-group{display:flex;flex-direction:column;gap:12px;}
.field-item{display:flex;flex-direction:column;gap:6px;}
.field-label{font-size:.78rem;color:var(--c-muted);font-weight:500;}
.field-input{width:100%;padding:10px 14px;border:1px solid var(--c-border);border-radius:var(--radius-sm);background:var(--c-surface);font-family:'Noto Sans TC',sans-serif;font-size:.88rem;color:var(--c-text);resize:vertical;min-height:44px;}
.field-input:focus{outline:none;border-color:var(--c-a2);background:var(--c-card);}
.result-box{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);padding:20px 22px;margin-top:20px;}
.result-label{font-size:.7rem;color:var(--c-a2);font-weight:500;letter-spacing:.5px;margin-bottom:10px;}
.result-text{font-size:.88rem;color:var(--c-text);line-height:1.9;font-family:'Courier New',monospace;white-space:pre-wrap;min-height:80px;}
.result-empty{color:var(--c-muted);font-size:.85rem;}
.action-row{display:flex;gap:10px;margin-top:16px;}
.btn-primary{background:var(--c-a2);color:#fff;border:none;padding:10px 22px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;cursor:pointer;}
.btn-primary:hover{background:#b8852e;}
.btn-ghost{background:transparent;color:var(--c-muted);border:1px solid var(--c-border);padding:10px 18px;border-radius:var(--radius-sm);font-size:.85rem;cursor:pointer;}
.btn-ghost:hover{border-color:var(--c-a2);color:var(--c-a2);}
.template-section{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--radius);padding:28px;margin-bottom:20px;}
.template-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:16px;}
.template-btn{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-sm);padding:10px 14px;font-size:.8rem;color:var(--c-text);cursor:pointer;text-align:left;line-height:1.5;font-family:'Noto Sans TC',sans-serif;}
.template-btn:hover{border-color:var(--c-a2);color:var(--c-a2);}
.bottom-nav{max-width:720px;margin:0 auto;padding:0 48px 60px;}
.footer{border-top:1px solid var(--c-border);padding:24px 48px;display:flex;align-items:center;gap:16px;}
.footer-logo{font-family:'Shippori Mincho',serif;font-size:.9rem;font-weight:700;color:var(--c-muted);}
.footer-note{font-size:.75rem;color:var(--c-muted);}
.toast{position:fixed;bottom:28px;right:28px;background:var(--c-text);color:#fff;padding:10px 18px;border-radius:var(--radius-sm);font-size:.82rem;font-weight:500;transform:translateY(60px);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);z-index:999;}
.toast.show{transform:none;opacity:1;}
@media(max-width:768px){.topbar{padding:0 16px;gap:8px;}.topbar-sub,.topbar-divider{display:none;}.prac-hero{padding:40px 20px 36px;}.tool-wrap{padding:0 20px 60px;}.template-grid{grid-template-columns:1fr;}.bottom-nav{padding:0 20px 40px;}.footer{padding:20px;}}</style>
</head>
<body>
  <nav class="topbar">
    <a class="logo" href="../index.html">弄一下工作室</a>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">辦公室 AI 工具實務應用</span>
    <div class="spacer"></div>
    <span class="topbar-tag">Part 1 · 演練</span>
  </nav>

  <div class="prac-hero">
    <a class="back-link" href="../index.html">← 回到課程總覽</a>
    <div class="hero-eyebrow">PRACTICE · 實例演練</div>
    <h1 class="prac-title">Prompt 黃金公式填空台</h1>
    <p class="prac-tagline">把三個關鍵原則實際填進去，即時組合出可貼入 Gemini 的完整指令。</p>
  </div>

  <div class="tool-wrap">
    <div class="tool-section">
      <div class="tool-label">STEP 1 · 填入三個元素</div>
      <div class="tool-title">背景 + 格式 + 情境，組合你的 Prompt</div>
      <div class="field-group">
        <div class="field-item">
          <label class="field-label">背景｜你是誰、在做什麼</label>
          <textarea class="field-input" id="f-bg" rows="2" placeholder="例如：我是行政人員，要通知全公司一件事…"></textarea>
        </div>
        <div class="field-item">
          <label class="field-label">格式｜你要什麼格式 / 長度</label>
          <textarea class="field-input" id="f-fmt" rows="2" placeholder="例如：條列格式，3-5 點，每點一句話，不超過 100 字…"></textarea>
        </div>
        <div class="field-item">
          <label class="field-label">情境｜具體說明或範例</label>
          <textarea class="field-input" id="f-ctx" rows="3" placeholder="例如：這次要通知的是辦公室空調節能措施，生效日是下週一…"></textarea>
        </div>
      </div>
      <div class="action-row">
        <button class="btn-primary" onclick="buildPrompt()">組合 Prompt</button>
        <button class="btn-ghost" onclick="clearAll()">清除重填</button>
      </div>
      <div class="result-box">
        <div class="result-label">組合結果</div>
        <div class="result-text" id="result"><span class="result-empty">填寫上方欄位後，點「組合 Prompt」即可在此預覽完整指令。</span></div>
      </div>
      <div class="action-row" style="margin-top:12px;">
        <button class="btn-ghost" onclick="copyResult()">複製 Prompt</button>
      </div>
    </div>

    <div class="template-section">
      <div class="tool-label">QUICK START · 快速套用情境</div>
      <div class="tool-title">點選情境，自動填入範例內容</div>
      <div class="template-grid">
        <button class="template-btn" onclick="applyTemplate('mail')">郵件通知情境<br><span style="color:var(--c-muted);font-size:.74rem;">通知全體員工</span></button>
        <button class="template-btn" onclick="applyTemplate('report')">週報摘要情境<br><span style="color:var(--c-muted);font-size:.74rem;">整理本週成果</span></button>
        <button class="template-btn" onclick="applyTemplate('meeting')">會議準備情境<br><span style="color:var(--c-muted);font-size:.74rem;">開場說明準備</span></button>
        <button class="template-btn" onclick="applyTemplate('proposal')">說服簡報情境<br><span style="color:var(--c-muted);font-size:.74rem;">向主管提案</span></button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a class="back-link" href="../index.html">← 回到課程總覽</a>
  </div>

  <footer class="footer">
    <span class="footer-logo">弄一下工作室</span>
    <span class="footer-note">辦公室 AI 工具實務應用 · Part 1 演練</span>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

    var templates={
      mail:{bg:'我是行政人員，需要寫通知信給全體員工',fmt:'主旨 + 正文兩段 + 結尾，不超過 200 字，語氣正式友善',ctx:'主題是[請填入主題]，生效日期是[請填入日期]'},
      report:{bg:'我需要整理本週工作成果',fmt:'分三區塊：本週完成 / 進行中 / 下週計畫，每點一句話',ctx:'以下是本週工作清單：[請貼上清單]'},
      meeting:{bg:'我要準備一個會議的開場說明',fmt:'條列式，3 點，每點 20 字以內',ctx:'會議主題是[主題]，出席者有[人員]，會議目標是[目標]'},
      proposal:{bg:'我要向主管提案',fmt:'問題→解決方案→效益 三段式，每段 2-3 句',ctx:'我想提案的是[提案內容]，目標是獲得[什麼支持/資源]'}
    };

    function applyTemplate(key){
      var t=templates[key];
      document.getElementById('f-bg').value=t.bg;
      document.getElementById('f-fmt').value=t.fmt;
      document.getElementById('f-ctx').value=t.ctx;
      buildPrompt();
      showToast('已套用情境範例');
    }

    function buildPrompt(){
      var bg=document.getElementById('f-bg').value.trim()||'[請填寫]';
      var fmt=document.getElementById('f-fmt').value.trim()||'[請填寫]';
      var ctx=document.getElementById('f-ctx').value.trim()||'[請填寫]';
      var result='你的任務背景：'+bg+'\n\n請以以下格式呈現：'+fmt+'\n\n具體情境說明：'+ctx;
      var el=document.getElementById('result');
      el.innerHTML='';
      el.textContent=result;
    }

    function copyResult(){
      var text=document.getElementById('result').textContent;
      if(!text||text.indexOf('填寫上方')===0){showToast('請先組合 Prompt');return;}
      navigator.clipboard.writeText(text).then(function(){showToast('已複製');});
    }

    function clearAll(){
      document.getElementById('f-bg').value='';
      document.getElementById('f-fmt').value='';
      document.getElementById('f-ctx').value='';
      document.getElementById('result').innerHTML='<span class="result-empty">填寫上方欄位後，點「組合 Prompt」即可在此預覽完整指令。</span>';
    }
  </script>
</body>
</html>
